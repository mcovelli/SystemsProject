<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Forgot Password | Northport University</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <h2 id="fp-title">Forgot Password</h2>

    <form method="get" action="verify_identity.php" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="Enter your account email" autocomplete="email">
      <button type="submit" class="btn">Continue</button>
    </form>

    <p style="text-align:center; margin-top:12px;">
      <a href="login.html">Back to login</a>
    </p>
  </div>
</body>
</html>
